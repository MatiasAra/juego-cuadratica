<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1410">
<title>Rugby — Funciones Cuadráticas</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f0e8;--surface:#eae5d8;--card:#fff;
  --dark:#1a1410;--muted:#8a8070;--border:#d4cfc2;
  --green:#1d9e75;--red:#d85a30;--blue:#185fa5;--accent:#f5a623;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{
  background:var(--bg);color:var(--dark);
  font-family:'DM Sans',sans-serif;
  padding:10px 12px 20px;
  max-width:480px;margin:0 auto;
}

/* SCOREBAR */
.scorebar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.score-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 4px;text-align:center;}
.score-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.score-val{font-size:22px;font-weight:500;line-height:1;}
.score-val.green{color:var(--green);}
.score-val.red{color:var(--red);}

/* DIFF BADGE */
.diff-badge{display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;vertical-align:middle;}
.diff-easy{background:#eaf3de;color:#3b6d11;}
.diff-med{background:#faeeda;color:#854f0b;}
.diff-hard{background:#fcebeb;color:#a32d2d;}

/* CHALLENGE BOX */
.challenge-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.ch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:5px;}
.ch-type{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;}
.type-a{background:#e6f1fb;color:#185fa5;}
.type-b{background:#faeeda;color:#854f0b;}
.type-c{background:#eaf3de;color:#3b6d11;}
.type-inv{background:#f3edfb;color:#5a2d9e;}
.ch-prog{font-size:11px;color:var(--muted);}
.ch-data{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.ch-datum{background:var(--surface);border-radius:8px;padding:5px 10px;font-size:12px;}
.ch-datum strong{font-weight:500;}
.ch-datum.unknown{border:1.5px dashed var(--border);color:var(--muted);}
.ch-question{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:8px;}
.ch-formula{font-family:'DM Mono',monospace;font-size:13px;background:var(--surface);border-radius:8px;padding:8px 12px;color:var(--dark);}

/* CONTROLS — columna única, sliders táctiles grandes */
.controls-col{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.ctrl-block{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;}
.ctrl-block.locked{opacity:.35;pointer-events:none;}
.ctrl-label{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.ctrl-label span{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--dark);background:var(--surface);padding:2px 8px;border-radius:6px;}
input[type=range]{
  width:100%;height:28px;
  -webkit-appearance:none;appearance:none;
  background:var(--surface);border-radius:14px;outline:none;
  accent-color:var(--dark);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:32px;height:32px;border-radius:50%;
  background:var(--dark);border:3px solid var(--bg);
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:var(--border);}

/* CANVAS */
.cw{border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px;background:#c9e8f5;position:relative;}
canvas{display:block;width:100%;}
#confetti-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* VERDICT */
.verdict{border-radius:10px;padding:12px 14px;font-size:14px;font-weight:500;margin-bottom:10px;display:none;line-height:1.5;}
.verdict.goal{background:#eaf3de;color:#3b6d11;}
.verdict.miss{background:#fcebeb;color:#a32d2d;}
.verdict-detail{font-size:12px;font-weight:400;margin-top:5px;opacity:.85;}

/* VERIFICACION */
.verif-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:none;}
.verif-title{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px;}
.verif-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.55;}
.verif-num{background:var(--dark);color:#fff;border-radius:50%;width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-top:1px;}
.verif-math{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface);border-radius:6px;padding:4px 8px;margin-top:4px;display:block;word-break:break-all;line-height:1.6;}

/* BOTONES — altura táctil mínima 48px */
.btn-col{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.kb{
  width:100%;padding:14px;font-size:15px;font-weight:500;
  border-radius:12px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--dark);
  min-height:48px;
}
.kb:active{transform:scale(.97);}
.kb.primary{background:var(--dark);color:var(--accent);border-color:var(--dark);font-size:16px;padding:16px;}
.kb.secondary{font-size:13px;background:var(--surface);}

/* END SCREEN */
.endscreen{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;text-align:center;display:none;}
.end-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.end-score{font-family:'Unbounded',sans-serif;font-size:56px;font-weight:900;color:var(--dark);margin-bottom:6px;}
.end-sub{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.6;}

/* Tabla resultados mobile */
.results-list{margin-bottom:16px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--surface);font-size:13px;}
.res-row-left{display:flex;flex-direction:column;gap:2px;}
.res-num{font-size:11px;color:var(--muted);}
.res-type{font-weight:500;}
.res-data{font-size:11px;color:var(--muted);}
.res-badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;}
.res-ok-b{background:#eaf3de;color:#3b6d11;}
.res-miss-b{background:#fcebeb;color:#a32d2d;}
</style>
</head>
<body>

<div class="scorebar">
  <div class="score-card"><div class="score-label">Desafío</div><div class="score-val" id="sc-num">1/6</div></div>
  <div class="score-card"><div class="score-label">Goles</div><div class="score-val green" id="sc-ok">0</div></div>
  <div class="score-card"><div class="score-label">Erradas</div><div class="score-val red" id="sc-err">0</div></div>
  <div class="score-card"><div class="score-label">Racha</div><div class="score-val" id="sc-streak">—</div></div>
</div>

<div class="challenge-box" id="chbox">
  <div class="ch-header">
    <div style="display:flex;align-items:center;gap:7px;">
      <div class="ch-type" id="ch-badge">Tipo</div>
      <span id="diff-badge" class="diff-badge diff-easy">Fácil</span>
    </div>
    <div class="ch-prog" id="ch-prog">Desafío 1 de 6</div>
  </div>
  <div class="ch-data" id="ch-data"></div>
  <div class="ch-question" id="ch-question"></div>
  <div class="ch-formula" id="ch-formula">y = ...x² + ...x</div>
</div>

<div class="controls-col">
  <div class="ctrl-block" id="ctrl-v0">
    <div class="ctrl-label">Velocidad inicial (m/s)<span id="lv0">18</span></div>
    <input type="range" min="10" max="30" step="1" value="18" id="sv0">
  </div>
  <div class="ctrl-block" id="ctrl-ang">
    <div class="ctrl-label">Ángulo de patada (°)<span id="lang">40</span></div>
    <input type="range" min="10" max="75" step="1" value="40" id="sang">
  </div>
  <div class="ctrl-block" id="ctrl-dist">
    <div class="ctrl-label">Distancia al poste (m)<span id="ldist">25</span></div>
    <input type="range" min="10" max="45" step="1" value="25" id="sdist">
  </div>
</div>

<div class="cw">
  <canvas id="sc"></canvas>
  <canvas id="confetti-canvas"></canvas>
</div>

<div class="verdict" id="verdict">
  <div id="verdict-main"></div>
  <div class="verdict-detail" id="verdict-detail"></div>
</div>

<div class="verif-box" id="verif-box">
  <div class="verif-title">Desarrollo algebraico paso a paso</div>
  <div id="verif-steps"></div>
</div>

<div class="btn-col">
  <button class="kb primary" id="kbtn">⚽ Patear</button>
  <button class="kb secondary" id="verif-btn" style="display:none">Ver desarrollo algebraico</button>
  <button class="kb secondary" id="nbtn" style="display:none">Siguiente desafío →</button>
</div>

<div class="endscreen" id="endscreen">
  <div class="end-title">Resultado final</div>
  <div class="end-score" id="end-score">—</div>
  <div class="end-sub" id="end-sub"></div>
  <div class="results-list" id="results-list"></div>
  <button class="kb primary" onclick="startGame()" style="margin-top:4px;">Jugar de nuevo</button>
</div>

<script>
// ── AUDIO ─────────────────────────────────────────────────────────────
let AC;
function getAC(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }

function playWhistle(){
  try{
    const ac=getAC(); if(ac.state==='suspended')ac.resume();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sine';o.frequency.setValueAtTime(1400,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(1800,ac.currentTime+0.08);
    o.frequency.exponentialRampToValueAtTime(1600,ac.currentTime+0.18);
    g.gain.setValueAtTime(0.4,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);
    o.start();o.stop(ac.currentTime+0.28);
  }catch(e){}
}

function playApplause(){
  try{
    const ac=getAC();
    for(let i=0;i<6;i++){
      const b=ac.createBufferSource(),buf=ac.createBuffer(1,ac.sampleRate*0.06,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/(d.length*0.3));
      b.buffer=buf;
      const g=ac.createGain();g.gain.setValueAtTime(0.3,ac.currentTime+i*0.07);
      b.connect(g);g.connect(ac.destination);b.start(ac.currentTime+i*0.07);
    }
  }catch(e){}
}

function playMiss(){
  try{
    const ac=getAC();
    const b=ac.createBufferSource(),buf=ac.createBuffer(1,ac.sampleRate*0.15,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,2)*0.8;
    b.buffer=buf;const g=ac.createGain();g.gain.setValueAtTime(0.5,ac.currentTime);
    b.connect(g);g.connect(ac.destination);b.start();
    setTimeout(()=>{
      const o=ac.createOscillator(),g2=ac.createGain();
      o.connect(g2);g2.connect(ac.destination);o.type='sawtooth';
      o.frequency.setValueAtTime(220,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(150,ac.currentTime+0.4);
      g2.gain.setValueAtTime(0.12,ac.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.45);
      o.start();o.stop(ac.currentTime+0.5);
    },200);
  }catch(e){}
}

// ── CONFETI ───────────────────────────────────────────────────────────
const cc=document.getElementById('confetti-canvas');
const cctx=cc.getContext('2d');
let confParts=[],confAnimId=null;

function launchConfetti(){
  confParts=[];
  const W=cc.offsetWidth,H=cc.offsetHeight;
  cc.width=W;cc.height=H;
  for(let i=0;i<100;i++){
    confParts.push({
      x:Math.random()*W,y:-10,
      vx:(Math.random()-.5)*4,vy:Math.random()*3+2,
      color:['#f5a623','#1d9e75','#185fa5','#d85a30','#fff','#f5c842'][Math.floor(Math.random()*6)],
      w:Math.random()*8+4,h:Math.random()*5+3,
      rot:Math.random()*360,rv:(Math.random()-.5)*8
    });
  }
  if(confAnimId)cancelAnimationFrame(confAnimId);
  animConf();
}
function animConf(){
  cctx.clearRect(0,0,cc.width,cc.height);
  confParts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=0.07;
    cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.rot*Math.PI/180);
    cctx.fillStyle=p.color;cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cctx.restore();
  });
  confParts=confParts.filter(p=>p.y<cc.height+20);
  if(confParts.length)confAnimId=requestAnimationFrame(animConf);
  else cctx.clearRect(0,0,cc.width,cc.height);
}

// ── JUEGO ─────────────────────────────────────────────────────────────
const canvas=document.getElementById('sc');
const ctx=canvas.getContext('2d');
let animId=null,animating=false;
let challenges=[],currentIdx=0,score={ok:0,err:0,streak:0};
let revealed=false,resultsLog=[];
let crowdAnim=0,crowdState='neutral';

function rnd(min,max,step){return min+Math.round(Math.random()*((max-min)/step))*step;}

function getDiff(idx){
  if(idx<2)return{label:'Fácil',cls:'diff-easy',win:2.5};
  if(idx<4)return{label:'Medio',cls:'diff-med',win:1.8};
  return{label:'Difícil',cls:'diff-hard',win:1.2};
}

function genChallenge(type,idx){
  const diff=getDiff(idx);
  const v0=rnd(13,25,1),ang=rnd(28,58,2),dist=rnd(12,38,2),barH=rnd(2,4,0.5);
  const topH=+(barH+diff.win).toFixed(1);
  const base={barH,topH,diff};
  if(type==='A')return{...base,type:'A',dist,v0Free:true,angFree:true,distFree:false,
    label:'¿Llegás?',badgeClass:'type-a',
    question:`Distancia: <strong>${dist} m</strong>. La pelota debe pasar entre <strong>${barH} m</strong> y <strong>${topH} m</strong>. Calculá velocidad y ángulo.`};
  if(type==='B')return{...base,type:'B',v0,ang,v0Free:false,angFree:false,distFree:true,
    label:'¿Desde dónde?',badgeClass:'type-b',
    question:`Velocidad: <strong>${v0} m/s</strong>, ángulo: <strong>${ang}°</strong>. Ventana: <strong>${barH}–${topH} m</strong>. Calculá la distancia x.`};
  if(type==='C')return{...base,type:'C',dist,ang,v0Free:true,angFree:false,distFree:false,
    label:'¿Con qué fuerza?',badgeClass:'type-c',
    question:`Distancia: <strong>${dist} m</strong>, ángulo: <strong>${ang}°</strong>. Ventana: <strong>${barH}–${topH} m</strong>. Calculá la velocidad v₀.`};
  const v0i=rnd(14,22,1),angi=rnd(30,55,2);
  const ri=angi*Math.PI/180,vxi=v0i*Math.cos(ri);
  const Ai=-9.8/(2*vxi*vxi),Bi=Math.tan(ri);
  const x1=rnd(4,8,1),x2=rnd(10,16,1),x3=rnd(18,25,1);
  const y1=+(Ai*x1*x1+Bi*x1).toFixed(1),y2=+(Ai*x2*x2+Bi*x2).toFixed(1),y3=+(Ai*x3*x3+Bi*x3).toFixed(1);
  return{...base,type:'D',dist:x3,v0Free:false,angFree:false,distFree:false,
    Ai,Bi,x1,y1,x2,y2,x3,y3,
    label:'¿Cuál es la función?',badgeClass:'type-inv',
    question:`La pelota pasó por (${x1},${y1}), (${x2},${y2}) y (${x3},${y3}). Determiná A y B de y=Ax²+Bx y ajustá los sliders hasta que la fórmula coincida.`};
}

function buildChallenges(){
  const types=['A','B','C','D','A','C'];
  for(let i=types.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[types[i],types[j]]=[types[j],types[i]];}
  return types.map((t,i)=>genChallenge(t,i));
}

function getAB(v0,ang){const r=ang*Math.PI/180,vx=v0*Math.cos(r);return{A:-9.8/(2*vx*vx),B:Math.tan(r)};}
function yAt(x,A,B){return A*x*x+B*x;}
function getSliders(){return{v0:+document.getElementById('sv0').value,ang:+document.getElementById('sang').value,dist:+document.getElementById('sdist').value};}

function updFormula(){
  const{v0,ang}=getSliders(),{A,B}=getAB(v0,ang);
  document.getElementById('ch-formula').textContent=`y = ${A.toFixed(3)}·x² + ${B.toFixed(2)}·x`;
}
function updScore(){
  document.getElementById('sc-ok').textContent=score.ok;
  document.getElementById('sc-err').textContent=score.err;
  document.getElementById('sc-streak').textContent=score.streak>1?'🔥'+score.streak:(score.streak||'—');
}

function renderChallenge(ch,idx){
  document.getElementById('ch-badge').textContent=ch.label;
  document.getElementById('ch-badge').className='ch-type '+ch.badgeClass;
  document.getElementById('sc-num').textContent=`${idx+1}/6`;
  document.getElementById('ch-prog').textContent=`Desafío ${idx+1} de 6`;
  const db=document.getElementById('diff-badge');db.textContent=ch.diff.label;db.className='diff-badge '+ch.diff.cls;
  document.getElementById('ch-question').innerHTML=ch.question;
  const dd=document.getElementById('ch-data');dd.innerHTML='';
  const add=(l,v,u)=>{const d=document.createElement('div');d.className='ch-datum'+(u?' unknown':'');d.innerHTML=u?`${l}: <strong>?</strong>`:`${l}: <strong>${v}</strong>`;dd.appendChild(d);};
  if(ch.type==='A'){add('Dist.',ch.dist+' m');add('Mín.',ch.barH+' m');add('Máx.',ch.topH+' m');add('v₀','?',true);add('θ','?',true);}
  if(ch.type==='B'){add('v₀',ch.v0+' m/s');add('θ',ch.ang+'°');add('Mín.',ch.barH+' m');add('Máx.',ch.topH+' m');add('Dist.','?',true);}
  if(ch.type==='C'){add('Dist.',ch.dist+' m');add('θ',ch.ang+'°');add('Mín.',ch.barH+' m');add('Máx.',ch.topH+' m');add('v₀','?',true);}
  if(ch.type==='D'){add(`(${ch.x1},${ch.y1})`,'');add(`(${ch.x2},${ch.y2})`,'');add(`(${ch.x3},${ch.y3})`,'');add('A','?',true);add('B','?',true);}
  const lockV=!ch.v0Free&&ch.type!=='D',lockA=!ch.angFree&&ch.type!=='D',lockD=!ch.distFree&&ch.type!=='D';
  document.getElementById('ctrl-v0').classList.toggle('locked',lockV);
  document.getElementById('ctrl-ang').classList.toggle('locked',lockA);
  document.getElementById('ctrl-dist').classList.toggle('locked',lockD);
  if(lockV){document.getElementById('sv0').value=ch.v0;document.getElementById('lv0').textContent=ch.v0;}
  if(lockA){document.getElementById('sang').value=ch.ang;document.getElementById('lang').textContent=ch.ang;}
  if(lockD){document.getElementById('sdist').value=ch.dist;document.getElementById('ldist').textContent=ch.dist;}
  updFormula();
  document.getElementById('verdict').style.display='none';
  document.getElementById('verif-box').style.display='none';
  document.getElementById('nbtn').style.display='none';
  document.getElementById('verif-btn').style.display='none';
  document.getElementById('kbtn').style.display='block';
  revealed=false;crowdState='neutral';crowdAnim=0;
  drawScene(null,0,false);
}

// ── CANVAS ────────────────────────────────────────────────────────────
function getLayout(v0,ang,dist,barH,topH){
  topH=topH||barH+2;
  const{A,B}=getAB(v0,ang);
  const xV=-B/(2*A),xR=-B/A,hM=yAt(xV,A,B);
  const xMax=Math.max(xR,dist)*1.2,yMax=Math.max(hM,topH+3)*1.3;
  const W=canvas.width,H=canvas.height,dpr=window.devicePixelRatio;
  const PL=40*dpr,PR=18*dpr,PT=18*dpr,PB=36*dpr;
  const pW=W-PL-PR,pH=H-PT-PB;
  const toX=x=>PL+(x/xMax)*pW,toY=y=>PT+pH-(y/yMax)*pH;
  return{W,H,PL,PR,PT,PB,pW,pH,toX,toY,xMax,yMax,xV,xR,hM,A,B,dpr};
}

function drawCrowd(toX,toY,dpr){
  const gY=toY(0);
  const cols=crowdState==='cheer'?['#e88','#8be','#feb','#8ec','#eaf']:['#aaa','#bbb','#999','#ccc','#aab'];
  for(let i=0;i<14;i++){
    const cx=toX(i*3.2)+8*dpr,cy=gY+10*dpr;
    const b=crowdState==='cheer'?Math.sin(crowdAnim*0.15+i)*3*dpr:0;
    ctx.fillStyle=cols[i%cols.length];
    ctx.beginPath();ctx.arc(cx,cy-b,4*dpr,Math.PI,0);ctx.fill();
    ctx.fillRect(cx-3*dpr,cy-b,6*dpr,7*dpr);
    if(crowdState==='cheer'){
      ctx.strokeStyle=cols[i%cols.length];ctx.lineWidth=2*dpr;
      ctx.beginPath();ctx.moveTo(cx-5*dpr,cy-b-2*dpr);ctx.lineTo(cx-8*dpr,cy-b-8*dpr);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+5*dpr,cy-b-2*dpr);ctx.lineTo(cx+8*dpr,cy-b-8*dpr);ctx.stroke();
    }
  }
  if(crowdState==='cheer')crowdAnim++;
}

function drawPostes(toX,toY,dist,barH,topH,dpr){
  const cX=toX(dist),gY=toY(0),travY=toY(barH),topY=toY(topH);
  const half=20*dpr,pw=4*dpr,col='#c8bfa0';
  const ext=(gY-travY)*0.9,tope=travY-ext;
  ctx.fillStyle='rgba(29,158,117,0.22)';
  ctx.fillRect(cX-half+pw/2,topY,half*2-pw,travY-topY);
  ctx.strokeStyle='rgba(29,158,117,0.7)';ctx.lineWidth=1.5*dpr;ctx.setLineDash([4*dpr,3*dpr]);
  ctx.beginPath();ctx.moveTo(cX-half+pw/2,topY);ctx.lineTo(cX+half-pw/2,topY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=col;
  ctx.fillRect(cX-half-pw/2,tope,pw,gY-tope);
  ctx.fillRect(cX+half-pw/2,tope,pw,gY-tope);
  ctx.fillRect(cX-half-pw/2,travY-pw/2,half*2+pw,pw);
  [cX-half,cX+half].forEach(cx=>{ctx.beginPath();ctx.arc(cx,tope,pw/2,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();});
  ctx.fillStyle='rgba(60,60,60,0.75)';ctx.font=`${10*dpr}px DM Sans`;
  ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(`${dist}m`,cX,gY+4*dpr);
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(`${barH}m`,cX+half+pw+3*dpr,travY);
  ctx.fillStyle='rgba(29,158,117,0.9)';
  ctx.fillText(`${topH}m`,cX+half+pw+3*dpr,topY);
}

function drawKicker(toX,toY,progress,dpr){
  const gY=toY(0),pX=toX(-0.8);
  const hR=6*dpr,tH=20*dpr,lH=20*dpr;
  ctx.save();ctx.strokeStyle='#334';ctx.fillStyle='#334';ctx.lineWidth=3*dpr;ctx.lineCap='round';
  const hY=gY-lH-tH-hR;
  ctx.beginPath();ctx.arc(pX,hY,hR,0,Math.PI*2);ctx.fill();
  const sY=hY+hR,hipY=sY+tH;
  ctx.beginPath();ctx.moveTo(pX,sY);ctx.lineTo(pX,hipY);ctx.stroke();
  const aA=0.4+progress*0.5;
  [[-1],[1]].forEach(([s])=>{ctx.beginPath();ctx.moveTo(pX,sY+5*dpr);ctx.lineTo(pX+s*Math.cos(aA)*16*dpr,sY+5*dpr+Math.sin(aA)*9*dpr);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(pX,hipY);ctx.lineTo(pX-4*dpr,gY);ctx.stroke();
  const kA=-Math.PI/2+progress*(Math.PI/2+0.4);
  const knX=pX+Math.cos(kA)*lH*0.5,knY=hipY+Math.sin(kA)*lH*0.5;
  const fA=kA+(progress<0.5?0.3:-0.3);
  ctx.beginPath();ctx.moveTo(pX,hipY);ctx.lineTo(knX,knY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(knX,knY);ctx.lineTo(knX+Math.cos(fA)*lH*0.5,knY+Math.sin(fA)*lH*0.5);ctx.stroke();
  ctx.restore();
}

function drawBall(bpx,bpy,vyDir,passed){
  ctx.save();ctx.translate(bpx,bpy);ctx.rotate(Math.atan2(-vyDir,1));
  ctx.beginPath();ctx.ellipse(0,0,9,6,0,0,Math.PI*2);
  ctx.fillStyle=passed?'#c8954a':'#D85A30';ctx.fill();
  ctx.strokeStyle=passed?'#7a5a2a':'#8a3010';ctx.lineWidth=1.2;ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(4,0);ctx.stroke();
  ctx.restore();
}

function drawScene(ballState,kickProgress,showTraj){
  const{v0,ang,dist}=getSliders();
  const ch=challenges[currentIdx];if(!ch)return;
  const barH=ch.barH,topH=ch.topH;
  const{W,H,PL,PB,PT,pW,pH,toX,toY,xMax,yMax,xV,xR,hM,A,B,dpr}=getLayout(v0,ang,dist,barH,topH);
  ctx.clearRect(0,0,W,H);
  const gY=toY(0);
  ctx.fillStyle='#c9e8f5';ctx.fillRect(PL,PT,pW,pH);
  ctx.fillStyle='#4a9a55';ctx.fillRect(PL,gY,pW,H-gY);
  drawCrowd(toX,toY,dpr);
  ctx.strokeStyle='rgba(100,100,100,0.1)';ctx.lineWidth=1;
  for(let yi=2;yi<=Math.ceil(yMax);yi+=2){ctx.beginPath();ctx.moveTo(PL,toY(yi));ctx.lineTo(PL+pW,toY(yi));ctx.stroke();}
  ctx.strokeStyle='rgba(80,80,80,0.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,gY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PL,gY);ctx.lineTo(PL+pW,gY);ctx.stroke();
  ctx.fillStyle='rgba(50,50,50,0.6)';ctx.font=`${10*dpr}px DM Sans`;
  ctx.textAlign='center';ctx.textBaseline='top';
  for(let xi=0;xi<=Math.ceil(xMax);xi+=5)ctx.fillText(xi,toX(xi),gY+3*dpr);
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let yi=2;yi<=Math.ceil(yMax);yi+=2)ctx.fillText(yi,PL-3*dpr,toY(yi));

  if(showTraj){
    ctx.beginPath();ctx.strokeStyle='rgba(50,50,50,0.2)';ctx.lineWidth=1.5;ctx.setLineDash([5*dpr,5*dpr]);
    let first=true;
    for(let s=0;s<=pW;s++){const x=(s/pW)*xMax,y=yAt(x,A,B);if(y<0)break;first?ctx.moveTo(PL+s,toY(y)):ctx.lineTo(PL+s,toY(y));first=false;}
    ctx.stroke();ctx.setLineDash([]);
    const vxPx=toX(xV),vyPx=toY(Math.min(hM,yMax*0.97));
    ctx.beginPath();ctx.arc(vxPx,vyPx,4*dpr,0,Math.PI*2);ctx.fillStyle='#378ADD';ctx.fill();
    ctx.fillStyle='#185FA5';ctx.font=`${10*dpr}px DM Sans`;
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText(`V(${xV.toFixed(1)},${hM.toFixed(1)})`,vxPx,vyPx-6*dpr);
    if(!ballState){
      const hP=yAt(dist,A,B);
      if(hP>0){
        const passed=hP>=barH&&hP<=topH&&dist<=xR,cX=toX(dist);
        ctx.strokeStyle=passed?'#1D9E75':'#D85A30';ctx.lineWidth=1.5*dpr;ctx.setLineDash([4*dpr,4*dpr]);
        ctx.beginPath();ctx.moveTo(cX,gY);ctx.lineTo(cX,toY(Math.min(hP,yMax*0.98)));ctx.stroke();ctx.setLineDash([]);
        ctx.beginPath();ctx.arc(cX,toY(Math.min(hP,yMax*0.98)),5*dpr,0,Math.PI*2);
        ctx.fillStyle=passed?'#1D9E75':'#D85A30';ctx.fill();
      }
    }
  }

  // Puntos desafío D
  if(ch.type==='D'){
    [[ch.x1,ch.y1],[ch.x2,ch.y2],[ch.x3,ch.y3]].forEach(([x,y])=>{
      ctx.beginPath();ctx.arc(toX(x),toY(y),5*dpr,0,Math.PI*2);
      ctx.fillStyle='#8a2be2';ctx.fill();
      ctx.fillStyle='#5a1d9e';ctx.font=`${10*dpr}px DM Sans`;
      ctx.textAlign='center';ctx.textBaseline='alphabetic';
      ctx.fillText(`(${x},${y})`,toX(x),toY(y)-7*dpr);
    });
  }

  drawPostes(toX,toY,dist,barH,topH,dpr);
  if(kickProgress!==undefined&&kickProgress>=0)drawKicker(toX,toY,kickProgress,dpr);
  if(ballState){
    const hP=yAt(dist,A,B),passed=hP>=barH&&hP<=topH&&dist<=xR;
    drawBall(toX(ballState.x),toY(Math.max(ballState.y,0)),ballState.vyDir,passed);
  }
}

// ── VERIFICACIÓN ──────────────────────────────────────────────────────
function showVerification(){
  const ch=challenges[currentIdx],{v0,ang,dist}=getSliders();
  const{A,B}=getAB(v0,ang),hP=yAt(dist,A,B);
  const box=document.getElementById('verif-box'),steps=document.getElementById('verif-steps');
  box.style.display='block';
  if(ch.type==='D'){
    steps.innerHTML=`
      <div class="verif-step"><div class="verif-num">1</div><div>Sistema con los 3 puntos (y=Ax²+Bx):<br>
        <span class="verif-math">${ch.y1} = ${ch.x1*ch.x1}A + ${ch.x1}B</span>
        <span class="verif-math">${ch.y2} = ${ch.x2*ch.x2}A + ${ch.x2}B</span>
      </div></div>
      <div class="verif-step"><div class="verif-num">2</div><div>Resolución del sistema:<br>
        <span class="verif-math">A = ${ch.Ai.toFixed(4)}</span>
        <span class="verif-math">B = ${ch.Bi.toFixed(4)}</span>
      </div></div>
      <div class="verif-step"><div class="verif-num">3</div><div>Verificación con (${ch.x3}, ${ch.y3}):<br>
        <span class="verif-math">y(${ch.x3}) = ${(ch.Ai*ch.x3*ch.x3+ch.Bi*ch.x3).toFixed(1)} ✓</span>
      </div></div>`;
    return;
  }
  const r=ang*Math.PI/180,vx=v0*Math.cos(r);
  steps.innerHTML=`
    <div class="verif-step"><div class="verif-num">1</div><div>Descomposición de velocidad:<br>
      <span class="verif-math">vx = ${v0}·cos(${ang}°) = ${vx.toFixed(2)} m/s</span>
      <span class="verif-math">tan(${ang}°) = ${Math.tan(r).toFixed(3)}</span>
    </div></div>
    <div class="verif-step"><div class="verif-num">2</div><div>Función de trayectoria:<br>
      <span class="verif-math">y = −9.8/(2·${vx.toFixed(2)}²)·x² + ${Math.tan(r).toFixed(3)}·x</span>
      <span class="verif-math">y = ${A.toFixed(4)}x² + ${B.toFixed(3)}x</span>
    </div></div>
    <div class="verif-step"><div class="verif-num">3</div><div>Evaluación en x = ${dist} m:<br>
      <span class="verif-math">y = ${(A*dist*dist).toFixed(3)} + ${(B*dist).toFixed(3)}</span>
      <span class="verif-math">y = ${hP.toFixed(2)} m</span>
    </div></div>
    <div class="verif-step"><div class="verif-num">4</div><div>Condición de ventana:<br>
      <span class="verif-math">${ch.barH} ≤ ${hP.toFixed(2)} ≤ ${ch.topH} → ${hP>=ch.barH&&hP<=ch.topH?'✅ Cumple':'❌ No cumple'}</span>
    </div></div>`;
}

// ── ANIMACIÓN ─────────────────────────────────────────────────────────
function kickAnimation(){
  if(animId)cancelAnimationFrame(animId);
  animating=true;revealed=true;
  document.getElementById('verdict').style.display='none';
  document.getElementById('verif-box').style.display='none';
  document.getElementById('kbtn').style.display='none';
  playWhistle();
  const{v0,ang,dist}=getSliders();
  const ch=challenges[currentIdx],barH=ch.barH,topH=ch.topH;
  const{A,B}=getAB(v0,ang),xR=-B/A;
  const hPost=yAt(dist,A,B),passed=hPost>=barH&&hPost<=topH&&dist<=xR;
  let startTime=null,phase='kick';
  function step(ts){
    if(!startTime)startTime=ts;
    const elapsed=ts-startTime;
    if(phase==='kick'){
      const t=Math.min(elapsed/500,1);
      drawScene(null,t,false);
      if(t>=1){phase='fly';startTime=ts;}
    } else {
      const t=Math.min(elapsed/1400,1);
      const xEnd=Math.max(xR,dist)*1.05,x=t*xEnd;
      const y=yAt(Math.min(x,xR>0?xR:x),A,B),slope=2*A*x+B;
      if(crowdState==='neutral'&&x>=dist*0.7)crowdState=passed?'cheer':'boo';
      drawScene({x,y:Math.max(y,0),vyDir:-slope},undefined,true);
      if(t>=1){
        animating=false;
        crowdState=passed?'cheer':'neutral';
        drawScene(null,undefined,true);
        if(passed){playApplause();launchConfetti();}else{playMiss();}
        const v=document.getElementById('verdict');
        v.style.display='block';v.className='verdict '+(passed?'goal':'miss');
        document.getElementById('verdict-main').textContent=passed
          ?`¡Conversión! Pasó a ${hPost.toFixed(2)} m`
          :(hPost<barH?`Por debajo. Altura: ${hPost.toFixed(2)} m (mínimo ${barH} m)`:`Demasiado alto. Altura: ${hPost.toFixed(2)} m (máximo ${topH} m)`);
        const diff=passed?0:(hPost<barH?barH-hPost:hPost-topH);
        document.getElementById('verdict-detail').textContent=passed
          ?`Dentro de la ventana ${barH}–${topH} m. ¡Perfecto!`
          :(hPost<barH?`Le faltaron ${diff.toFixed(2)} m. Subí velocidad o ángulo.`:`Se pasó por ${diff.toFixed(2)} m. Bajá velocidad o ángulo.`);
        if(passed){score.ok++;score.streak++;}else{score.err++;score.streak=0;}
        updScore();
        resultsLog.push({idx:currentIdx+1,type:ch.label,diff:ch.diff.label,barH,topH,hPost,passed});
        document.getElementById('verif-btn').style.display='block';
        if(currentIdx<challenges.length-1)document.getElementById('nbtn').style.display='block';
        else setTimeout(showEnd,1800);
        return;
      }
    }
    animId=requestAnimationFrame(step);
  }
  animId=requestAnimationFrame(step);
}

// ── FIN ───────────────────────────────────────────────────────────────
function showEnd(){
  ['chbox','verif-box','verdict'].forEach(id=>document.getElementById(id).style.display='none');
  document.querySelector('.controls-col').style.display='none';
  document.querySelector('.cw').style.display='none';
  document.querySelector('.btn-col').style.display='none';
  document.getElementById('endscreen').style.display='block';
  document.getElementById('end-score').textContent=`${score.ok}/6`;
  const msgs=['Seguí practicando — los cálculos mejoran con la repetición.','Buen intento, ya le agarraste la mano.','Muy bien — dominás las funciones cuadráticas.','¡Perfecto! Pateador élite y matemático de primer nivel.'];
  document.getElementById('end-sub').textContent=msgs[Math.min(Math.floor(score.ok/2),3)];
  const list=document.getElementById('results-list');list.innerHTML='';
  resultsLog.forEach(r=>{
    const div=document.createElement('div');div.className='res-row';
    div.innerHTML=`<div class="res-row-left"><div class="res-num">Desafío ${r.idx} · ${r.diff}</div><div class="res-type">${r.type}</div><div class="res-data">Ventana ${r.barH}–${r.topH} m · Tu altura: ${r.hPost.toFixed(2)} m</div></div><div class="res-badge ${r.passed?'res-ok-b':'res-miss-b'}">${r.passed?'✅':'❌'}</div>`;
    list.appendChild(div);
  });
}

function startGame(){
  challenges=buildChallenges();currentIdx=0;score={ok:0,err:0,streak:0};resultsLog=[];updScore();
  document.getElementById('chbox').style.display='block';
  document.querySelector('.controls-col').style.display='flex';
  document.querySelector('.cw').style.display='block';
  document.querySelector('.btn-col').style.display='flex';
  document.getElementById('endscreen').style.display='none';
  document.getElementById('kbtn').style.display='block';
  document.getElementById('nbtn').style.display='none';
  document.getElementById('verif-btn').style.display='none';
  document.getElementById('verdict').style.display='none';
  document.getElementById('verif-box').style.display='none';
  renderChallenge(challenges[0],0);
}

// ── EVENTOS ───────────────────────────────────────────────────────────
['sv0','sang','sdist'].forEach((id,i)=>{
  document.getElementById(id).addEventListener('input',e=>{
    document.getElementById(['lv0','lang','ldist'][i]).textContent=e.target.value;
    updFormula();
    if(!revealed)drawScene(null,0,false);else drawScene(null,undefined,true);
  });
});
document.getElementById('kbtn').addEventListener('click',()=>{if(!animating)kickAnimation();});
document.getElementById('nbtn').addEventListener('click',()=>{currentIdx++;renderChallenge(challenges[currentIdx],currentIdx);});
document.getElementById('verif-btn').addEventListener('click',()=>{
  const vb=document.getElementById('verif-box');
  if(vb.style.display==='none'){showVerification();document.getElementById('verif-btn').textContent='Ocultar desarrollo';}
  else{vb.style.display='none';document.getElementById('verif-btn').textContent='Ver desarrollo algebraico';}
});

function resize(){
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr;
  canvas.height=240*dpr;canvas.style.height='240px';
  cc.width=canvas.offsetWidth;cc.height=240;
  if(challenges.length&&challenges[currentIdx])drawScene(null,revealed?undefined:0,revealed);
}
window.addEventListener('resize',resize);
// Forzar resize al cargar fonts
document.fonts.ready.then(()=>{startGame();resize();});
</script>
